name: Question
description: Something in the whitepaper is unclear. Unclear writing is a bug.
title: "[Question] "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What is unclear? Reference the section number if possible.
    validations:
      required: true
  - type: textarea
    id: what-you-expected
    attributes:
      label: What you expected
      description: What did you expect the whitepaper to say, or what interpretation are you unsure between?
